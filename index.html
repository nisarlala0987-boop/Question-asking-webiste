<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300;1,500&family=Outfit:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#FAF8F5;color:#0F0D0B;min-height:100vh;padding:0}
.wrap{max-width:640px;margin:0 auto;padding:2.5rem 1.5rem 3rem}
.brand{text-align:center;margin-bottom:2.5rem}
.brand-line{width:48px;height:1px;background:#B8955A;margin:0 auto 1.2rem}
.brand h1{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;letter-spacing:0.04em;color:#0F0D0B;line-height:1.1}
.brand h1 span{font-style:italic;color:#B8955A}
.brand p{font-size:0.72rem;letter-spacing:0.18em;text-transform:uppercase;color:#7A756E;margin-top:0.6rem}
.step{display:none;animation:rise 0.45s cubic-bezier(.22,.68,0,1.2)}
.step.active{display:block}
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.prog{display:flex;gap:6px;margin-bottom:2.5rem}
.prog-dot{flex:1;height:3px;background:#E8E4DE;border-radius:2px;transition:background 0.3s}
.prog-dot.done{background:#B8955A}
.step-meta{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.step-num{width:28px;height:28px;border:1px solid #B8955A;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.68rem;color:#B8955A;font-weight:500;flex-shrink:0}
.step-q{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:300;color:#0F0D0B;line-height:1.25}
.opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:2rem}
.opt{background:#fff;border:1px solid #E8E4DE;border-radius:14px;padding:1.1rem 0.8rem;cursor:pointer;text-align:center;transition:border-color 0.18s,background 0.18s;position:relative;overflow:hidden}
.opt:hover{border-color:#D4B07A;background:#FFFDF9}
.opt.sel{border-color:#B8955A;background:#FFFDF9}
.opt.sel::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:#B8955A}
.opt-icon{width:36px;height:36px;border-radius:50%;background:#F4F1EC;display:flex;align-items:center;justify-content:center;margin:0 auto 0.6rem;font-size:16px}
.opt-label{font-size:0.82rem;font-weight:500;color:#0F0D0B;display:block;margin-bottom:0.2rem}
.opt-hint{font-size:0.67rem;color:#7A756E;line-height:1.35;display:block}
.nav{display:flex;justify-content:space-between;align-items:center}
.btn-back{background:none;border:none;color:#7A756E;font-family:'Outfit',sans-serif;font-size:0.8rem;cursor:pointer;padding:0.5rem 0;letter-spacing:0.05em}
.btn-back:hover{color:#0F0D0B}
.btn-next{background:#B8955A;border:none;color:#fff;font-family:'Outfit',sans-serif;font-size:0.74rem;font-weight:500;padding:0.65rem 1.8rem;border-radius:40px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;transition:opacity 0.2s;opacity:0.3;pointer-events:none}
.btn-next.on{opacity:1;pointer-events:all}
.btn-next.on:hover{opacity:0.85}
.btn-go{width:100%;background:#0F0D0B;border:none;color:#FAF8F5;font-family:'Outfit',sans-serif;font-size:0.76rem;font-weight:500;padding:1rem;border-radius:40px;cursor:pointer;letter-spacing:0.12em;text-transform:uppercase;transition:opacity 0.2s;margin-top:1rem;opacity:0.3;pointer-events:none}
.btn-go.on{opacity:1;pointer-events:all}
.btn-go.on:hover{opacity:0.8}
.loading-view{text-align:center;padding:5rem 1rem}
.loader-ring{width:44px;height:44px;border:1.5px solid #E8E4DE;border-top-color:#B8955A;border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 1.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;font-style:italic;color:#0F0D0B;margin-bottom:0.4rem}
.loading-sub{font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:#7A756E}
.result-img-wrap{border-radius:18px;overflow:hidden;background:#F4F1EC;border:1px solid #E8E4DE;min-height:280px;display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem}
.result-img-wrap img{width:100%;height:auto;display:block}
.img-loader{display:flex;flex-direction:column;align-items:center;gap:0.75rem;padding:3.5rem 1rem}
.img-loader-ring{width:28px;height:28px;border:1.5px solid #E8E4DE;border-top-color:#B8955A;border-radius:50%;animation:spin 0.9s linear infinite}
.img-loader-txt{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#7A756E}
.result-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.tag{font-size:0.64rem;letter-spacing:0.12em;text-transform:uppercase;color:#B8955A;border:1px solid #E8DECA;padding:0.28rem 0.7rem;border-radius:20px;background:#FFFDF9}
.result-name{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:#0F0D0B;line-height:1.15;margin-bottom:0.3rem}
.result-caption{font-size:0.82rem;color:#7A756E;font-style:italic;margin-bottom:1.5rem;line-height:1.5}
.divider{width:100%;height:1px;background:#E8E4DE;margin-bottom:1.5rem}
.items-title{font-size:0.63rem;letter-spacing:0.14em;text-transform:uppercase;color:#7A756E;margin-bottom:0.9rem}
.items-grid{display:grid;gap:8px;margin-bottom:1.25rem}
.item-row{display:flex;align-items:center;gap:0.75rem;padding:0.7rem 0.9rem;background:#F4F1EC;border-radius:10px}
.item-icon{width:30px;height:30px;border-radius:8px;background:#fff;border:1px solid #E8E4DE;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.item-text{font-size:0.82rem;color:#0F0D0B;line-height:1.4}
.tip-box{border-left:2px solid #B8955A;padding:0.85rem 1rem;background:#FFFDF9;border-radius:0 10px 10px 0;margin-bottom:1.5rem}
.tip-label{font-size:0.62rem;letter-spacing:0.14em;text-transform:uppercase;color:#B8955A;margin-bottom:0.3rem}
.tip-text{font-size:0.82rem;color:#7A756E;line-height:1.5;font-style:italic}
.btn-restart{width:100%;background:none;border:1px solid #E8E4DE;color:#7A756E;font-family:'Outfit',sans-serif;font-size:0.72rem;padding:0.75rem;border-radius:40px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;transition:all 0.2s}
.btn-restart:hover{border-color:#0F0D0B;color:#0F0D0B}
</style>

  confident:{

      classy:{name:'The Country Club',caption:'Sport as a lifestyle, elevated.',items:['Top: Fitted white polo shirt','Bottom: Pleated tennis skirt or chino shorts in beige','Shoes: Classic white leather court sneakers','Accessory: Visor cap, small stud earrings','Bag: Canvas tote with leather handles'],tip:'The polo-and-tennis-skirt combo is the most elevated activewear look.'},
      boho:{name:'The Yoga Goddess',caption:'Move with flow, look with intention.',items:['Top: Flowy cropped tank in sage green','Bottom: High-waist printed yoga leggings','Shoes: Barefoot trainers or minimal sandals','Accessory: Crystal or wooden bead bracelet','Bag: Large tote in natural canvas'],tip:'Earthy tones in activewear always look intentional, never try-hard.'},
      y2k:{name:'The Retro Athlete',caption:'2000s tracksuit energy at the gym.',items:['Top: Cropped zip-up track jacket in baby blue','Bottom: Matching flared track pants','Shoes: Retro runners in white and silver','Accessory: Thick headband, small hoop earrings','Bag: Matching sport bag'],tip:'A matching track set is the Y2K gym essential — get it in a bold colour.'},
      'dark-luxe':{name:'The Dark Athletic',caption:'Training in all-black everything.',items:['Top: Black compression long-sleeve top','Bottom: Black high-waist training leggings','Shoes: Black training sneakers, minimal logo','Accessory: Black silicone watch, black earbuds','Bag: Black gym duffel, minimal'],tip:'All-black gym wear hits differently — pick fabrics with different sheens.'}
    }
  }
};

function getOutfit(){
  try{
    const moodData=DB[A.mood];
    if(!moodData)throw 0;
    const occData=moodData[A.occasion];
    if(!occData)throw 0;
    const fit=occData[A.vibe];
    if(!fit)throw 0;
    return fit;
  }catch(e){
    return {name:'The Signature Look',caption:'Effortless style, curated for you.',items:['Top: Fitted white tee, premium cotton','Bottom: Dark slim-fit denim jeans','Shoes: White leather sneakers','Accessory: Minimal gold chain','Bag: Structured leather tote in camel'],tip:'A half-tuck adds shape to any outfit without overthinking it.'};
  }
}

const moodLabels={confident:'Confident',chill:'Chill',romantic:'Romantic',edgy:'Edgy',playful:'Playful',polished:'Polished'};
const occLabels={casual:'Casual out',work:'Work',date:'Date night',party:'Party',home:'At home',active:'Active'};
const vibeLabels={minimal:'Minimal',streetwear:'Streetwear',classy:'Classy',boho:'Boho',y2k:'Y2K','dark-luxe':'Dark luxe'};
const itemIcons={'top':'👕','bottom':'👖','shoes':'👟','accessory':'✨','bag':'👜','dress':'👗','jacket':'🧥','pants':'👖'};
function iconFor(t){const low=t.toLowerCase();for(const[k,v]of Object.entries(itemIcons)){if(low.startsWith(k))return v;}return '🪡';}

function pick(step,key,val,btn){
  A[key]=val;
  document.getElementById('s'+step).querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  if(step<3){const n=document.getElementById('n'+step);if(n)n.classList.add('on');}
  else{document.getElementById('btnGo').classList.add('on');}
  for(let i=1;i<=step;i++)document.getElementById('pd'+i).classList.add('done');
}

function go(step){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+step).classList.add('active');
}

function generate(){
  if(!A.mood||!A.occasion||!A.vibe)return;
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('sLoad').classList.add('active');
  setTimeout(()=>{
    const fit=getOutfit();
    renderResult(fit);
    loadImg(fit);
  },1400);
}

function renderResult(fit){
  const tags=[moodLabels[A.mood],occLabels[A.occasion],vibeLabels[A.vibe]].filter(Boolean).map(t=>`<span class="tag">${t}</span>`).join('');
  const items=fit.items.map(i=>`<div class="item-row"><div class="item-icon">${iconFor(i)}</div><div class="item-text">${i}</div></div>`).join('');
  document.getElementById('rContent').innerHTML=`
    <div class="result-img-wrap" id="imgWrap">
      <div class="img-loader"><div class="img-loader-ring"></div><div class="img-loader-txt">Finding your look</div></div>
    </div>
    <div class="result-tags">${tags}</div>
    <div class="result-name">${fit.name}</div>
    <div class="result-caption">${fit.caption}</div>
    <div class="divider"></div>
    <div class="items-title">The pieces</div>
    <div class="items-grid">${items}</div>
    <div class="tip-box"><div class="tip-label">Stylist tip</div><div class="tip-text">${fit.tip}</div></div>`;
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('sResult').classList.add('active');
}

function loadImg(fit){
  const wrap=document.getElementById('imgWrap');
  if(!wrap)return;
  const q=encodeURIComponent(`${A.vibe} ${A.mood} fashion outfit`);
  const urls=[
    `https://source.unsplash.com/600x750/?${q}`,
    `https://source.unsplash.com/600x750/?fashion,${encodeURIComponent(A.vibe)}`,
    `https://source.unsplash.com/600x750/?fashion,style,outfit`
  ];
  let done=false;
  const tryUrl=(i)=>{
    if(i>=urls.length||done){showFallback(wrap,fit);return;}
    const img=new Image();
    const t=setTimeout(()=>{if(!done)tryUrl(i+1);},6000);
    img.onload=()=>{clearTimeout(t);if(!done&&wrap){done=true;wrap.innerHTML=`<img src="${urls[i]}" alt="outfit" style="width:100%;display:block"/>`;}}
    img.onerror=()=>{clearTimeout(t);tryUrl(i+1);}
    img.src=urls[i];
  };
  tryUrl(0);
}

function showFallback(wrap,fit){
  const palettes={minimal:'#F5F4F0,#2C2C2A',streetwear:'#1A1A2E,#E8E4DE',classy:'#1C1408,#C9A96E',boho:'#3D2B1A,#D4845A',y2k:'#1A0A2E,#D4A0C0','dark-luxe':'#0A0A0A,#888888'};
  const [bg,acc]=(palettes[A.vibe]||'#F4F1EC,#B8955A').split(',');
  const emojis={confident:'🔥',chill:'🌿',romantic:'🌸',edgy:'⚡',playful:'🎨',polished:'💼'};
  wrap.innerHTML=`<div style="width:100%;min-height:260px;background:${bg};display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem;text-align:center;border-radius:18px">
    <div style="font-size:2.6rem;margin-bottom:1rem">${emojis[A.mood]||'✨'}</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;font-style:italic;color:${acc};margin-bottom:0.4rem">${fit.name}</div>
    <div style="font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:${acc};opacity:0.6">${vibeLabels[A.vibe]} · ${moodLabels[A.mood]}</div>
  </div>`;
}

function restart(){
  A.mood=null;A.occasion=null;A.vibe=null;
  document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.btn-next').forEach(b=>b.classList.remove('on'));
  document.getElementById('btnGo').classList.remove('on');
  document.getElementById('rContent').innerHTML='';
  for(let i=1;i<=3;i++)document.getElementById('pd'+i).classList.remove('done');
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('s1').classList.add('active');
}
</script>
